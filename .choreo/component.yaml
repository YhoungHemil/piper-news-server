FROM python:3.10-slim

RUN pip install --no-cache-dir flask flask-cors onnxruntime numpy requests

RUN mkdir -p /voices /tmp/piper_models
WORKDIR /app
COPY main.py /app/main.py

RUN useradd -u 10014 -m choreouser && chown -R choreouser:choreouser /app /voices /tmp/piper_models
USER 10014

EXPOSE 5000
CMD ["python", "/app/main.py"]
